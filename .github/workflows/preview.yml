name: PR Preview

on:
  pull_request:
    types: [opened, synchronize, reopened]

jobs:
  deploy-preview:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Deploy to GitHub Pages
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./
          destination_dir: previews/pr-${{ github.event.number }}
          keep_files: true

      - name: Get CNAME
        id: get_cname
        run: |
          if [ -f CNAME ]; then
            echo "domain=$(cat CNAME)" >> $GITHUB_OUTPUT
          else
            echo "domain=${{ github.repository_owner }}.github.io/${{ github.event.repository.name }}" >> $GITHUB_OUTPUT
          fi

      - name: Post Preview Link
        uses: actions/github-script@v7
        with:
          script: |
            const prNumber = context.issue.number;
            const domain = '${{ steps.get_cname.outputs.domain }}';
            const previewUrl = `https://${domain}/previews/pr-${prNumber}/`;
            const body = `🚀 Preview for this PR has been deployed!\n\n**[View Preview](${previewUrl})**`;

            // Check if a comment already exists to avoid spamming
            const { data: comments } = await github.rest.issues.listComments({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: prNumber,
            });

            const botComment = comments.find(comment => comment.body.includes('🚀 Preview for this PR has been deployed!'));

            if (botComment) {
              await github.rest.issues.updateComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                comment_id: botComment.id,
                body: body
              });
            } else {
              await github.rest.issues.createComment({
                issue_number: prNumber,
                owner: context.repo.owner,
                repo: context.repo.repo,
                body: body
              });
            }
