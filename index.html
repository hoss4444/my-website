<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Employee Property Dashboard</title>
    
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600&display=swap" rel="stylesheet">
    
    <link rel="stylesheet" href="https://cdn.datatables.net/1.13.6/css/jquery.dataTables.min.css">
    
    <style>
        body {
            font-family: 'Inter', sans-serif;
            background-color: #f8fafc; /* Sleek, modern off-white */
            color: #1e293b;
            margin: 0;
            padding: 40px 20px;
        }
        .header {
            text-align: center;
            margin-bottom: 40px;
        }
        .header h1 {
            color: #0f172a;
            font-size: 2.5em;
            margin: 0;
        }
        .header p {
            color: #64748b;
            font-size: 1.1em;
        }
        .property-section {
            background-color: #ffffff;
            border-radius: 12px;
            box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.1), 0 2px 4px -1px rgba(0, 0, 0, 0.06);
            padding: 30px;
            margin-bottom: 40px;
            max-width: 1200px;
            margin-left: auto;
            margin-right: auto;
        }
        .property-title {
            color: #3b82f6; /* Professional blue accent */
            border-bottom: 2px solid #e2e8f0;
            padding-bottom: 10px;
            margin-top: 0;
        }
        table.dataTable {
            border-collapse: collapse !important;
            width: 100% !important;
        }
        table.dataTable thead th {
            background-color: #f1f5f9;
            color: #475569;
            font-weight: 600;
            padding: 12px;
            border-bottom: 2px solid #cbd5e1 !important;
        }
        table.dataTable tbody td {
            padding: 12px;
            border-bottom: 1px solid #e2e8f0;
        }
        table.dataTable tbody tr:hover {
            background-color: #f8fafc;
        }
    </style>
</head>
<body>

    <div class="header">
        <h1>Property Management Dashboard</h1>
        <p>Secure Internal Portal • Auto-Updates Every 10 Minutes</p>
    </div>

    <div id="dashboard-container"></div>

    <script src="https://code.jquery.com/jquery-3.7.0.min.js"></script>
    <script src="https://cdn.datatables.net/1.13.6/js/jquery.dataTables.min.js"></script>

    <script>
        // Fetch the raw data generated by your Python Robot
        fetch('data.json')
            .then(response => response.json())
            .then(data => {
                const container = document.getElementById('dashboard-container');
                let tableCounter = 0;

                // Loop through each property in your JSON file
                for (const [propertyName, rows] of Object.entries(data)) {
                    if (!rows || rows.length === 0) continue;

                    tableCounter++;
                    const tableId = `table-${tableCounter}`;

                    // Create the HTML structure for this property
                    const section = document.createElement('div');
                    section.className = 'property-section';
                    
                    const title = document.createElement('h2');
                    title.className = 'property-title';
                    title.textContent = propertyName;
                    
                    const table = document.createElement('table');
                    table.id = tableId;
                    table.className = 'display';

                    // Extract headers from the first row of data
                    const headers = Object.keys(rows[0]);
                    
                    // Build Table Header
                    let theadHtml = '<thead><tr>';
                    headers.forEach(header => {
                        theadHtml += `<th>${header}</th>`;
                    });
                    theadHtml += '</tr></thead>';

                    // Build Table Body
                    let tbodyHtml = '<tbody>';
                    rows.forEach(row => {
                        tbodyHtml += '<tr>';
                        headers.forEach(header => {
                            // Replace null/undefined with a blank space
                            let cellValue = row[header] !== null && row[header] !== undefined ? row[header] : '';
                            tbodyHtml += `<td>${cellValue}</td>`;
                        });
                        tbodyHtml += '</tr>';
                    });
                    tbodyHtml += '</tbody>';

                    table.innerHTML = theadHtml + tbodyHtml;

                    // Assemble the section
                    section.appendChild(title);
                    section.appendChild(table);
                    container.appendChild(section);

                    // Turn the raw HTML table into a highly professional, interactive DataTable
                    $(`#${tableId}`).DataTable({
                        pageLength: 25, // Show 25 rows per page by default
                        responsive: true,
                        language: {
                            search: "Filter records:"
                        }
                    });
                }
            })
            .catch(error => {
                console.error('Error loading the data:', error);
                document.getElementById('dashboard-container').innerHTML = 
                    '<p style="text-align:center; color:red;">Error loading property data. The robot may still be processing the latest files.</p>';
            });
    </script>
</body>
</html>
