<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Property Data</title>
    <style>
        /* Basic styling */
        body {
            font-family: Arial, sans-serif;
            margin: 40px;
            background-color: #f4f7f6;
            color: #333;
        }
        h1 {
            text-align: center;
            color: #2c3e50;
            margin-bottom: 30px;
        }
        
        /* Styling for the Clickable Dropdown Menus (Accordions) */
        details {
            background-color: white;
            margin-bottom: 15px;
            border-radius: 8px;
            box-shadow: 0 2px 5px rgba(0,0,0,0.1);
            overflow: hidden;
        }
        summary {
            font-size: 1.3em;
            font-weight: bold;
            color: #fff;
            background-color: #3498db;
            cursor: pointer;
            padding: 15px 20px;
            list-style: none; /* Hides default arrow on some browsers */
            position: relative;
        }
        /* Custom plus/dropdown indicator */
        summary::after {
            content: '▼';
            position: absolute;
            right: 20px;
            font-size: 0.8em;
        }
        details[open] summary::after {
            content: '▲';
        }
        summary:hover {
            background-color: #2980b9;
        }
        
        /* Table Styling */
        .table-container {
            padding: 15px;
            overflow-x: auto; /* Adds a scrollbar if the table is too wide for the screen */
        }
        table {
            width: 100%;
            border-collapse: collapse;
        }
        th, td {
            padding: 10px 15px;
            text-align: left;
            border-bottom: 1px solid #ddd;
            font-size: 0.95em;
        }
        th {
            background-color: #ecf0f1;
            color: #2c3e50;
            font-weight: bold;
        }
        tr:hover {
            background-color: #f9f9f9;
        }
    </style>
</head>
<body>

    <h1>Our Properties</h1>

    <details>
        <summary>West End</summary>
        <div class="table-container">
            <table id="west-end-table">
                <thead id="west-end-head"></thead>
                <tbody id="west-end-body"></tbody>
            </table>
        </div>
    </details>

    <details>
        <summary>Downtown Older Buildings</summary>
        <div class="table-container">
            <table id="downtown-table">
                <thead id="downtown-head"></thead>
                <tbody id="downtown-body"></tbody>
            </table>
        </div>
    </details>

    <details>
        <summary>The Leston</summary>
        <div class="table-container">
            <table id="leston-table">
                <thead id="leston-head"></thead>
                <tbody id="leston-body"></tbody>
            </table>
        </div>
    </details>

    <details>
        <summary>Rosenthal</summary>
        <div class="table-container">
            <table id="rosenthal-table">
                <thead id="rosenthal-head"></thead>
                <tbody id="rosenthal-body"></tbody>
            </table>
        </div>
    </details>

    <details>
        <summary>Edge</summary>
        <div class="table-container">
            <table id="edge-table">
                <thead id="edge-head"></thead>
                <tbody id="edge-body"></tbody>
            </table>
        </div>
    </details>

    <details>
        <summary>EH</summary>
        <div class="table-container">
            <table id="eh-table">
                <thead id="eh-head"></thead>
                <tbody id="eh-body"></tbody>
            </table>
        </div>
    </details>

    <script>
        // Fetch the data from your JSON file
        fetch('data.json')
            .then(response => response.json())
            .then(data => {
                
                // Helper function to build tables automatically
                function buildTable(tableData, headId, bodyId) {
                    if (!tableData || tableData.length === 0) {
                        document.getElementById(bodyId).innerHTML = "<tr><td>No data available for this property yet.</td></tr>";
                        return; 
                    }

                    // Get the column names from the first row of data
                    const columns = Object.keys(tableData[0]);
                    
                    // Build the header row
                    const headElement = document.getElementById(headId);
                    let headerHTML = '<tr>';
                    columns.forEach(col => {
                        headerHTML += `<th>${col}</th>`;
                    });
                    headerHTML += '</tr>';
                    headElement.innerHTML = headerHTML;

                    // Build the data rows
                    const bodyElement = document.getElementById(bodyId);
                    let bodyHTML = '';
                    tableData.forEach(row => {
                        bodyHTML += '<tr>';
                        columns.forEach(col => {
                            let cellData = row[col] !== null ? row[col] : ''; 
                            bodyHTML += `<td>${cellData}</td>`;
                        });
                        bodyHTML += '</tr>';
                    });
                    bodyElement.innerHTML = bodyHTML;
                }

                // Call the helper function for ALL 6 locations
                buildTable(data.west_end, 'west-end-head', 'west-end-body');
                buildTable(data.downtown_older_buildings, 'downtown-head', 'downtown-body');
                buildTable(data.the_leston, 'leston-head', 'leston-body');
                buildTable(data.rosenthal, 'rosenthal-head', 'rosenthal-body');
                buildTable(data.edge, 'edge-head', 'edge-body');
                buildTable(data.eh, 'eh-head', 'eh-body');

            })
            .catch(error => {
                console.error("Error loading the Excel data:", error);
            });
    </script>

</body>
</html>
