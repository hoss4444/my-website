<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Property Data</title>
    <style>
        /* Basic styling */
        body {
            font-family: Arial, sans-serif;
            margin: 40px;
            background-color: #f4f7f6;
            color: #333;
        }
        h1 {
            text-align: center;
            color: #2c3e50;
            margin-bottom: 30px;
        }
        
        /* Styling for the Clickable Dropdown Menus */
        details {
            background-color: white;
            margin-bottom: 15px;
            border-radius: 8px;
            box-shadow: 0 2px 5px rgba(0,0,0,0.1);
            overflow: hidden;
        }
        summary {
            font-size: 1.3em;
            font-weight: bold;
            color: #fff;
            background-color: #3498db;
            cursor: pointer;
            padding: 15px 20px;
            list-style: none; 
            position: relative;
        }
        summary::after {
            content: '▼';
            position: absolute;
            right: 20px;
            font-size: 0.8em;
        }
        details[open] summary::after {
            content: '▲';
        }
        summary:hover {
            background-color: #2980b9;
        }
        
        /* Iframe (Embed) Styling */
        .iframe-container {
            padding: 0;
            width: 100%;
            height: 600px; /* How tall the window into your spreadsheet is */
        }
        iframe {
            width: 100%;
            height: 100%;
            border: none;
        }
    </style>
</head>
<body>

    <h1>Our Properties</h1>

    <details>
        <summary>West End</summary>
        <div class="iframe-container">
            <iframe src="https://drive.google.com/file/d/1FC3H3bD-QGucif1646vNdLOeq8Lrf6qD/preview"></iframe>
        </div>
    </details>

    <details>
        <summary>Downtown Older Buildings</summary>
        <div class="iframe-container">
            <iframe src="https://drive.google.com/file/d/1MwBY-2tCzJmU1O_ngp4LqfzZfW4lZGbw/preview"></iframe>
        </div>
    </details>

    <details>
        <summary>The Leston</summary>
        <div class="iframe-container">
            <iframe src="https://drive.google.com/file/d/1FdEhY-P4f7g0rAxCWYyJybXHDqHYSeqe/preview"></iframe>
        </div>
    </details>

    <details>
        <summary>Rosenthal</summary>
        <div class="iframe-container">
            <iframe src="https://drive.google.com/file/d/12rFEh5F8FbNqxzehpuPPI6sFbaVWe3FT/preview"></iframe>
        </div>
    </details>

    <details>
        <summary>Edge</summary>
        <div class="iframe-container">
            <iframe src="https://drive.google.com/file/d/1LZz2r1pmXrSV7wgclzAVu_jOcPp_hVkk/preview"></iframe>
        </div>
    </details>

    <details>
        <summary>EH</summary>
        <div class="iframe-container">
            <iframe src="https://drive.google.com/file/d/1am88PUSHbGuow3Et0eTk0of_b1lp-QSM/preview"></iframe>
        </div>
    </details>

</body>
</html>
